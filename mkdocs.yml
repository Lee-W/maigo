site_name: Maigo
site_description: "MyGO!!!!! 驅動的通用開發 agent flow。大家一起迷失吧。"
site_url: https://lee-w.github.io/maigo/
repo_url: https://github.com/Lee-W/maigo
repo_name: Lee-W/maigo

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - include-markdown

nav:
  - Home: index.md
  - Reference:
      - Agents: reference/agents.md
      - Commands: reference/commands.md
      - Hooks: reference/hooks.md
      - Skills: reference/skills.md
      - Memory: reference/memory.md
      - Character colors: reference/character-colors.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Contributing: guides/contributing.md
  - Agents (source):
      - Raana: agents/raana.md
      - Tomori: agents/tomori.md
      - Anon: agents/anon.md
      - Soyo: agents/soyo.md
      - Taki: agents/taki.md
  - Commands (source):
      - /maigo:go: commands/go.md
      - /maigo:team: commands/team.md
      - /maigo:quick: commands/quick.md
      - /maigo:review: commands/review.md
      - /maigo:remember: commands/remember.md
      - /maigo:memory: commands/memory.md
      - /maigo:retro: commands/retro.md
      - /maigo:crystallize: commands/crystallize.md
      - /maigo:describe-pr: commands/describe-pr.md
      - /maigo:address-comments: commands/address-comments.md
      - /maigo:triage-issue: commands/triage-issue.md
      - /maigo:take-issue: commands/take-issue.md
      - /maigo:doctor: commands/doctor.md
      - /maigo:repo-audit: commands/repo-audit.md
  - Skills (source):
      - strict-review: skills/strict-review.md
      - airflow-aware: skills/airflow-aware.md
      - commitizen-aware: skills/commitizen-aware.md
      - commit-message: skills/commit-message.md
      - failure-handling: skills/failure-handling.md
      - github-title-description: skills/github-title-description.md
      - pr-context-cache: skills/pr-context-cache.md
      - maigo-self-check: skills/maigo-self-check.md
      - memory-loading: skills/memory-loading.md
      - memory-propose-confirm: skills/memory-propose-confirm.md
      - narration: skills/narration.md
      - orchestrator-voice: skills/orchestrator-voice.md
      - teammate-flow: skills/teammate-flow.md
      - doc-link-convention: skills/doc-link-convention.md
      - strict-triage: skills/strict-triage.md
      - copyable-deliverable: skills/copyable-deliverable.md
      - github-reply-draft: skills/github-reply-draft.md
      - git-workflow: skills/git-workflow.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc
